<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Default Colors (Designed for Light Mode) */
    :root {
      --text-start-color: #0056b3; /* Deep Blue for contrast on light */
      --text-end-color: #003366;
      --accent-color: #007bff;
      --glow-opacity: 0.1; /* Minimal glow for light mode */
    }

    /* Colors for Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --text-start-color: #00d2ff; /* Bright Cyan for dark mode */
        --text-end-color: #3a7bd5;   /* Modern Blue */
        --accent-color: #00d2ff;
        --glow-opacity: 0.6; /* Stronger glow for dark mode */
      }
    }

    .main-text {
      fill: url(#dynamicGradient);
      filter: url(#dynamicGlow);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 70px;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .accent-line {
      fill: url(#dynamicGradient);
      opacity: 0.7;
    }

    .accent-dot-start {
      fill: var(--text-start-color);
    }
    .accent-dot-end {
      fill: var(--text-end-color);
    }
  </style>

  <defs>
    <linearGradient id="dynamicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: var(--text-start-color); stop-opacity: 1" />
      <stop offset="100%" style="stop-color: var(--text-end-color); stop-opacity: 1" />
    </linearGradient>
    
    <filter id="dynamicGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="var(--accent-color)" flood-opacity="var(--glow-opacity)" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="main-text">
    Assembly
  </text>

  <rect x="100" y="140" width="300" height="4" class="accent-line" rx="2" />
  <circle cx="100" cy="142" r="6" class="accent-dot-start" />
  <circle cx="400" cy="142" r="6" class="accent-dot-end" />
</svg>
